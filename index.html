<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TripTalk | Connect the Ride</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#00d2ff">
  <link rel="stylesheet" href="./asset/css/style.css?v=6.0.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
  <div class="app-shell">
    <!-- 🟢 TOP BAR: Status & Brand -->
    <header class="main-header">
      <div class="brand">
        <span class="logo">🏍️</span>
        <h1>TripTalk</h1>
      </div>
      <div class="header-status">
        <div id="connectionStatusBadge" class="mini-badge disconnected"></div>
        <div id="micStatusBadge" class="mini-badge muted"></div>
      </div>
    </header>

    <!-- 🟢 MAIN CONTENT AREA -->
    <main class="content-area">
      
      <!-- 🏠 JOIN/START VIEW (Initial State) -->
      <section id="setupView" class="view-panel active">
        <div class="welcome-card">
          <h2>เตรียมออกทริป</h2>
          <p>ใส่ชื่อและรหัสห้องเพื่อเริ่มสนทนา</p>
          <div class="input-stack">
            <div class="input-field">
              <label>ชื่อเล่น</label>
              <input type="text" id="nicknameInput" placeholder="ระบุชื่อของคุณ" maxlength="15">
            </div>
            <div class="input-field">
              <label>รหัสทริป</label>
              <input type="text" id="roomInput" placeholder="เช่น BKK-001" maxlength="10">
            </div>
          </div>
          <button class="btn-hero" id="startRideBtn">
            <span class="btn-icon">🚀</span>
            <span id="startBtnText">เริ่มทริปเลย</span>
          </button>
        </div>
      </section>

      <!-- 🏍️ RIDE VIEW (Active State) -->
      <section id="rideView" class="view-panel" style="display:none;">
        <!-- Stats Summary -->
        <div class="stats-bar" id="networkStatusPanel">
          <div class="stat-item"><span class="stat-label">Ping:</span> <span id="pingValue">--</span></div>
          <div class="stat-item"><span class="stat-label">Quality:</span> <span id="qualityValue">--</span></div>
        </div>

        <!-- Member Grid -->
        <div class="members-container">
          <h3>👥 สมาชิกในกลุ่ม</h3>
          <ul class="member-grid" id="memberList"></ul>
        </div>

        <!-- Map Mini Preview -->
        <div class="map-container" id="mapDiv">
          <div id="map"></div>
        </div>
        
        <button class="btn-leave-long" id="leaveRoomBtn">
          <span class="btn-text">กดค้างเพื่อออกจากห้อง</span>
        </button>
      </section>

      <!-- ⚙️ SETTINGS VIEW -->
      <section id="settingsView" class="view-panel" style="display:none;">
        <div class="settings-group">
          <h3>🎨 รูปแบบหน้าจอ</h3>
          <div class="theme-grid" id="themeSwitcher"></div>
          
          <div class="setting-row">
            <span>ขนาดตัวอักษร</span>
            <input type="range" id="fontSizeSlider" min="80" max="140" step="10" value="100">
          </div>
        </div>

        <div class="settings-group">
          <h3>⚙️ ระบบตัดเสียงลม (VAD)</h3>
          <div class="vad-tester">
            <button id="testMicBtn" class="btn-outline-sm">ทดสอบไมค์</button>
            <div class="meter-bar">
              <div class="meter-fill" id="volumeMeterFill"></div>
              <div class="threshold-line" id="thresholdMarker"></div>
            </div>
          </div>
          
          <div class="setting-row">
            <span>ความไว (Threshold)</span>
            <input type="range" id="thresholdSlider" min="0" max="100" value="50">
          </div>
          <div class="setting-row">
            <span>หน่วงเวลา (Hold)</span>
            <input type="range" id="holdTimeSlider" min="400" max="3000" step="100" value="1500">
          </div>
          <div class="setting-row">
            <span>ตัดเสียงลม (Wind)</span>
            <input type="range" id="highpassSlider" min="50" max="500" step="10" value="100">
          </div>
        </div>
      </section>
    </main>

    <!-- 🟢 BOTTOM NAVIGATION -->
    <nav class="bottom-nav">
      <button class="nav-item active" data-view="setupView" id="navHome">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">หน้าแรก</span>
      </button>
      <button class="nav-item" data-view="rideView" id="navRide" style="display:none;">
        <span class="nav-icon">🏍️</span>
        <span class="nav-label">การขับขี่</span>
      </button>
      <button class="nav-item" data-view="settingsView" id="navSettings">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">ตั้งค่า</span>
      </button>
    </nav>

    <!-- 🆘 SOS BUTTON (Floating) -->
    <button class="sos-fab" id="sosBtnMain" style="display:none;">
      <svg class="sos-ring" viewBox="0 0 100 100">
        <circle class="ring-bg" cx="50" cy="50" r="45"></circle>
        <circle id="sosProgressCircle" class="ring-fill" cx="50" cy="50" r="45"></circle>
      </svg>
      <span class="sos-label">SOS</span>
    </button>
  </div>

  <!-- Scripts -->
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="./asset/js/webRTC.js?v=6.0.0"></script>
  <script src="./asset/js/vad.js?v=6.0.0"></script>
  <script src="./asset/js/app.js?v=6.0.0"></script>
</body>
</html>
